<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator UI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator">
        <div class="title-bar">
            <span>Scientific Calculator</span>
            <div class="window-controls">
                <button class="help-btn">Help</button>
                <span class="control-icon">—</span>
                <span class="control-icon">✕</span>
            </div>
        </div>

        <div class="display-container">
            <div class="history-display" id="history"></div>
            <div class="current-display" id="current">0</div>
        </div>

        <div class="top-controls">
            <button class="btn btn-gray">mod</button>
            <div class="radio-group">
                <label><input type="radio" name="unit" value="Deg"> Deg</label>
                <label><input type="radio" name="unit" value="Rad" checked> Rad</label>
            </div>
            <div class="memory-btns">
                <button class="btn btn-gray">MC</button>
                <button class="btn btn-gray">MR</button>
                <button class="btn btn-gray">MS</button>
                <button class="btn btn-gray">M+</button>
                <button class="btn btn-gray">M-</button>
            </div>
        </div>

        <div class="button-grid">
            <button class="btn">sinh</button>
            <button class="btn">cosh</button>
            <button class="btn">tanh</button>
            <button class="btn">Exp</button>
            <button class="btn">(</button>
            <button class="btn">)</button>
            <button class="btn btn-red" style="grid-column: span 2;">←</button>
            <button class="btn btn-red">C</button>
            <button class="btn btn-red">±</button>
            <button class="btn">sqrt</button>

            <button class="btn" data-op="sinh-1">sinh⁻¹</button>
            <button class="btn" data-op="cosh-1">cosh⁻¹</button>
            <button class="btn" data-op="tanh-1">tanh⁻¹</button>
            <button class="btn">log₂x</button>
            <button class="btn">ln</button>
            <button class="btn">log</button>
            <button class="btn btn-num">7</button>
            <button class="btn btn-num">8</button>
            <button class="btn btn-num">9</button>
            <button class="btn">/</button>
            <button class="btn">%</button>

            <button class="btn">π</button>
            <button class="btn">e</button>
            <button class="btn">n!</button>
            <button class="btn" data-op="logyx">log<sub>y</sub>x</button>
            <button class="btn" data-op="ex">e<sup>x</sup></button>
            <button class="btn" data-op="10x">10<sup>x</sup></button>
            <button class="btn btn-num">4</button>
            <button class="btn btn-num">5</button>
            <button class="btn btn-num">6</button>
            <button class="btn">*</button>
            <button class="btn">1/x</button>

            <button class="btn">sin</button>
            <button class="btn">cos</button>
            <button class="btn">tan</button>
            <button class="btn" data-op="xy">x<sup>y</sup></button>
            <button class="btn">x<sup>3</sup></button>
            <button class="btn">x<sup>2</sup></button>
            <button class="btn btn-num">1</button>
            <button class="btn btn-num">2</button>
            <button class="btn btn-num">3</button>
            <button class="btn">-</button>
            <button class="btn btn-equal" style="grid-row: span 2;">=</button>

            <button class="btn">sin⁻¹</button>
            <button class="btn">cos⁻¹</button>
            <button class="btn">tan⁻¹</button>
            <button class="btn" data-op="yroot"><sup>y</sup>√x</button>
            <button class="btn" data-op="3root"><sup>3</sup>√x</button>
            <button class="btn">|x|</button>
            <button class="btn btn-num" style="grid-column: span 2;">0</button>
            <button class="btn">.</button>
            <button class="btn">+</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
